# Smoke config — tiny, fast, end-to-end on CPU/MPS with no API key.
# A few docs, a few queries, a handful of LoRA steps. Proves the wiring, not results.
seed: 13

paths:
  corpus: examples/corpus
  eval: examples/eval.jsonl
  rerank_seed: examples/rerank_seed.jsonl
  data_dir: data/smoke/rerank
  adapter: models/smoke-adapter
  chroma: .chroma-smoke
  results: data/smoke/results.md

model:
  base: mlx-community/Llama-3.2-3B-Instruct-4bit
  use_mlx: true

finetune:
  iters: 4
  batch_size: 1
  num_layers: 2
  learning_rate: 1.0e-4
  max_seq_length: 1024
  steps_per_eval: 2
  val_fraction: 0.34

embeddings:
  backend: local
  local_model: BAAI/bge-small-en-v1.5
  device: auto

retrieval:
  candidates_k: 4
  top_k: 2
  vector_weight: 0.5
  bm25_weight: 0.5
  rrf_k: 60

reranker:
  mode: llama3
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  max_tokens: 64
  strict: false                       # smoke stays lenient; see default.yaml note

generator:
  backend: auto                       # falls back to the stub when no key/Ollama
  openai_model: gpt-4o
  ollama_model: llama3.2
  max_tokens: 200

judge:
  backend: auto                       # skips RAGAS when no judge is available
  openai_model: gpt-4o

# Default config — faithful to the paper where possible.
# Free/local by default; OpenAI is used automatically if OPENAI_API_KEY is set.
seed: 13

paths:
  corpus: examples/corpus
  eval: examples/eval.jsonl
  rerank_seed: examples/rerank_seed.jsonl
  data_dir: data/rerank
  adapter: models/adapter
  chroma: .chroma
  results: data/results.md

model:
  # Default: Llama-3.2-3B-Instruct, 4-bit quantized (fits 24GB comfortably).
  base: mlx-community/Llama-3.2-3B-Instruct-4bit
  # Switch to the larger Llama-3 8B (slower, memory-tight on 24GB):
  #   base: mlx-community/Meta-Llama-3-8B-Instruct-4bit
  use_mlx: true

finetune:
  iters: 200
  batch_size: 1
  num_layers: 8
  learning_rate: 1.0e-4
  max_seq_length: 2048
  steps_per_eval: 50
  val_fraction: 0.2

embeddings:
  backend: local                      # local | openai
  local_model: BAAI/bge-small-en-v1.5
  device: auto                        # auto (prefers MPS) | mps | cpu
  openai_model: text-embedding-3-small

retrieval:
  candidates_k: 8                     # ensemble candidates fed to the reranker
  top_k: 4                            # passages kept after rerank, into the generator
  vector_weight: 0.5
  bm25_weight: 0.5
  rrf_k: 60

reranker:
  mode: llama3                        # llama3 | cross_encoder
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  max_tokens: 128
  # strict=true makes the LLaMA-3 reranker hard-fail instead of silently using the
  # lexical fallback when MLX/the adapter is unavailable. Recommended for the real
  # RAGAS comparison so you never score the fallback by mistake.
  strict: false

generator:
  backend: auto                       # auto | openai | ollama | stub
  openai_model: gpt-4o
  ollama_model: llama3.2
  ollama_host: http://localhost:11434
  max_tokens: 400

judge:                                # RAGAS judge LLM
  backend: auto                       # auto | openai | none
  openai_model: gpt-4o
